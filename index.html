<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dragonlance Saga Role Checker</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState } = React;
    
    const ATTRS = ["AG", "DX", "EN", "ST", "RE", "PE", "SP", "PR"];
    const CODE_VALUES = { A: 5, B: 4, C: 3, D: 2, X: 1 };
    const CODES = ["A", "B", "C", "D", "X"];

    const ROLES = {
      "Race Centaur": {
        scores: [
          {attr:"EN",type:"min",value:7},
          {attr:"ST",type:"min",value:7},
          {attr:"RE",type:"max",value:7},
          {attr:"PE",type:"min",value:7}
        ],
        codes: [
          {attr:"DX",type:"exact",value:"A"},
          {attr:"EN",type:"exact",value:"X"}
        ]
      },
      "Race Half-elf": {
        special_dict: {
          type:"at_least_n_scores",
          attrs:["AG","DX","PR"],
          value:6,
          n:2
        },
        or_groups: [
          {attrs:["EN","ST"],kind:"score",type:"max",value:8},
          {attrs:["DX","ST"],kind:"code",type:"min",value:"B"}
        ]
      },
      "Race Human": {
        or_groups: [
          {attrs:["EN","PE"],kind:"code",type:"max",value:"B"}
        ]
      },
      "Race Kender": {
        scores: [
          {attr:"AG",type:"min",value:7},
          {attr:"DX",type:"min",value:7},
          {attr:"EN",type:"max",value:6},
          {attr:"ST",type:"max",value:6}
        ],
        codes: [
          {attr:"AG",type:"max",value:"D"},
          {attr:"EN",type:"max",value:"C"},
          {attr:"PE",type:"min",value:"B"}
        ],
        or_groups: [
          {attrs:["PE","PR"],kind:"score",type:"min",value:6}
        ]
      },
      "Adventurous Warrior": {
        scores: [
          {attr:"AG",type:"min",value:4},
          {attr:"DX",type:"min",value:4},
          {attr:"ST",type:"min",value:4},
          {attr:"EN",type:"min",value:4}
        ],
        codes: [
          {attr:"AG",type:"min",value:"C"},
          {attr:"DX",type:"min",value:"C"},
          {attr:"ST",type:"min",value:"C"},
          {attr:"EN",type:"min",value:"C"}
        ],
        or_groups: [
          {kind:"score",attrs:["AG","DX"],type:"min",value:5},
          {kind:"score",attrs:["ST","EN"],type:"min",value:5},
          {kind:"code",attrs:["AG","DX"],type:"exact",value:"A"},
          {kind:"code",attrs:["ST","EN"],type:"exact",value:"A"}
        ]
      },
      "Guild Thief": {
        or_groups: [
          {attrs:["DX","RE","PE"],kind:"code",type:"min",value:"B"}
        ]
      }
    };

    // Analysis logic (same as artifact)
    function checkOrGroupWithMisses(scores, codes, group, mode = "sizing") {
      const threshold = mode === "dropshop" ? 10 : 2;
      const allValues = {};
      
      if (group.kind === 'score') {
        let closestAttr = null, closestDiff = Infinity;
        
        for (const attr of group.attrs) {
          const val = scores[attr];
          allValues[attr] = val;
          
          let diff;
          if (group.type === 'min') {
            if (val >= group.value) return [true, [], {}];
            diff = group.value - val;
          } else if (group.type === 'max') {
            if (val <= group.value) return [true, [], {}];
            diff = val - group.value;
          } else continue;
          
          if (diff < closestDiff) {
            closestDiff = diff;
            closestAttr = attr;
          }
        }
        
        if (closestAttr && closestDiff <= threshold) {
          return [false, [[closestAttr, closestDiff, 'score', group.type]], allValues];
        }
        return [false, null, allValues];
      }
      
      if (group.kind === 'code') {
        let closestAttr = null, closestDiff = Infinity;
        
        for (const attr of group.attrs) {
          const valCode = codes[attr];
          allValues[attr] = valCode;
          const codeVal = CODE_VALUES[valCode];
          const codeReq = CODE_VALUES[group.value];
          
          let diff;
          if (group.type === 'min') {
            if (codeVal >= codeReq) return [true, [], {}];
            diff = codeReq - codeVal;
          } else if (group.type === 'max') {
            if (codeVal <= codeReq) return [true, [], {}];
            diff = codeVal - codeReq;
          } else if (group.type === 'exact') {
            if (valCode === group.value) return [true, [], {}];
            diff = Math.abs(codeVal - codeReq);
          } else continue;
          
          if (diff < closestDiff) {
            closestDiff = diff;
            closestAttr = attr;
          }
        }
        
        if (closestAttr && closestDiff === 1) {
          return [false, [[closestAttr, closestDiff, 'code', group.type]], allValues];
        }
        return [false, null, allValues];
      }
      
      return [false, null, {}];
    }

    function checkAtLeastNScoresWithMisses(scores, attrs, value, n) {
      const allValues = {}, passedAttrs = [], missList = [];
      
      for (const attr of attrs) {
        const val = scores[attr] || 0;
        allValues[attr] = val;
        if (val >= value) passedAttrs.push(attr);
        else missList.push([attr, value - val, "score"]);
      }
      
      const passed = passedAttrs.length >= n;
      return [passed, missList, allValues, passedAttrs];
    }

    function checkAtLeastNCodesWithMisses(codes, attrs, minCode, n) {
      const codeReq = CODE_VALUES[minCode];
      const allValues = {}, passedAttrs = [], missList = [];
      
      for (const attr of attrs) {
        const valCode = codes[attr];
        if (!valCode) continue;
        allValues[attr] = valCode;
        const codeVal = CODE_VALUES[valCode];
        
        if (codeVal >= codeReq) passedAttrs.push(attr);
        else {
          const diff = codeReq - codeVal;
          if (diff <= 1) missList.push([attr, diff, 'code', 'min']);
        }
      }
      
      const passed = passedAttrs.length >= n;
      if (passed) return [true, [], allValues, passedAttrs];
      
      const missingNeeded = n - passedAttrs.length;
      const effectiveMisses = missList.sort((a,b) => a[1] - b[1]).slice(0, missingNeeded);
      return [false, effectiveMisses.length ? effectiveMisses : null, allValues, passedAttrs];
    }

    function analyzeRoleFit(scores, codes, roleName, roleDef, mode) {
      const scoreDeficits = [], scoreResources = [], codeDeficits = [], codeResources = [];
      const claimedAttrs = new Set(), scoreDeficitAttrs = new Set(), codeDeficitAttrs = new Set();
      const lockedScoreAttrs = new Set(), lockedCodeAttrs = new Set();
      
      // Phase 1: Special requirements
      for (const group of (roleDef.or_groups || [])) {
        const [passed, missList] = checkOrGroupWithMisses(scores, codes, group, mode);
        
        if (!passed) {
          for (const attr of group.attrs) claimedAttrs.add(attr);
          
          if (missList) {
            for (const miss of missList) {
              if (miss.length === 4) {
                const [attr, diff, kind, violationType] = miss;
                claimedAttrs.add(attr);
                
                if (kind === 'score') {
                  scoreDeficits.push({attr, points: diff, target: group.value});
                  scoreDeficitAttrs.add(attr);
                  if (violationType === 'max') {
                    const usable = Math.min(scores[attr], 2);
                    scoreResources.push({attr, points: usable, target: group.value});
                  }
                } else if (kind === 'code') {
                  codeDeficits.push({attr, points: diff, target: group.value});
                  codeDeficitAttrs.add(attr);
                  if (violationType === 'max') {
                    const maxDrop = CODE_VALUES[codes[attr]] - CODE_VALUES["X"];
                    const usable = Math.min(maxDrop, 1);
                    if (usable > 0) codeResources.push({attr, points: usable, target: group.value});
                  }
                }
              }
            }
          } else return null;
        } else {
          for (const attr of group.attrs) claimedAttrs.add(attr);
          
          if (group.kind === "code") {
            const reqCodeVal = CODE_VALUES[group.value];
            const satisfying = group.attrs.filter(a => codes[a] && CODE_VALUES[codes[a]] >= reqCodeVal);
            if (satisfying.length) {
              const chosen = satisfying.reduce((a,b) => CODE_VALUES[codes[a]] > CODE_VALUES[codes[b]] ? a : b);
              lockedCodeAttrs.add(chosen);
            }
          } else if (group.kind === "score" && group.type === "min") {
            const satisfying = group.attrs.filter(a => scores[a] >= group.value);
            if (satisfying.length) {
              const chosen = satisfying.reduce((a,b) => scores[a] > scores[b] ? a : b);
              lockedScoreAttrs.add(chosen);
            }
          }
        }
      }
      
      // at_least_n
      const sd = roleDef.special_dict;
      if (sd?.type === 'at_least_n_codes') {
        const [passed, missList, _, passedAttrs] = checkAtLeastNCodesWithMisses(codes, sd.attrs, sd.min_code, sd.n);
        for (const attr of sd.attrs) claimedAttrs.add(attr);
        
        if (passed) {
          const sorted = passedAttrs.sort((a,b) => CODE_VALUES[codes[a]] - CODE_VALUES[codes[b]]);
          for (const attr of sorted.slice(0, sd.n)) lockedCodeAttrs.add(attr);
        } else {
          for (const attr of passedAttrs) lockedCodeAttrs.add(attr);
          if (missList) {
            for (const [attr, diff] of missList) {
              codeDeficits.push({attr, points: diff, target: sd.min_code});
              codeDeficitAttrs.add(attr);
            }
          } else return null;
        }
      } else if (sd?.type === 'at_least_n_scores') {
        const [passed, missList, _, passedAttrs] = checkAtLeastNScoresWithMisses(scores, sd.attrs, sd.value, sd.n);
        for (const attr of sd.attrs) claimedAttrs.add(attr);
        
        if (passed) {
          const sorted = passedAttrs.sort((a,b) => scores[a] - scores[b]);
          for (const attr of sorted.slice(0, sd.n)) lockedScoreAttrs.add(attr);
        } else {
          for (const attr of passedAttrs) lockedScoreAttrs.add(attr);
          if (missList) {
            const missingNeeded = sd.n - passedAttrs.length;
            const sortedMisses = missList.sort((a,b) => a[1] - b[1]).slice(0, missingNeeded);
            for (const [attr, diff] of sortedMisses) {
              scoreDeficits.push({attr, points: diff, target: sd.value});
              scoreDeficitAttrs.add(attr);
            }
          } else return null;
        }
      }
      
      // Phase 2: Basic requirements
      const basicScoreAttrs = new Set(), basicCodeAttrs = new Set();
      
      for (const req of (roleDef.scores || [])) {
        basicScoreAttrs.add(req.attr);
        if (scoreDeficitAttrs.has(req.attr) || lockedScoreAttrs.has(req.attr)) continue;
        
        const val = scores[req.attr];
        if (req.type === 'min') {
          if (val < req.value) {
            scoreDeficits.push({attr: req.attr, points: req.value - val, target: req.value});
            scoreDeficitAttrs.add(req.attr);
          } else {
            const usable = Math.min(val - req.value, 2);
            if (usable > 0) scoreResources.push({attr: req.attr, points: usable, target: req.value});
          }
        } else if (req.type === 'max') {
          if (val > req.value) {
            scoreDeficits.push({attr: req.attr, points: val - req.value, target: req.value});
            scoreDeficitAttrs.add(req.attr);
          }
          const usable = Math.min(val, 2);
          if (usable > 0) scoreResources.push({attr: req.attr, points: usable, target: req.value});
        }
      }
      
      for (const req of (roleDef.codes || [])) {
        basicCodeAttrs.add(req.attr);
        if (codeDeficitAttrs.has(req.attr) || lockedCodeAttrs.has(req.attr)) continue;
        
        const valCode = codes[req.attr];
        const codeVal = CODE_VALUES[valCode];
        const codeReq = CODE_VALUES[req.value];
        
        if (req.type === 'min') {
          if (codeVal < codeReq) {
            codeDeficits.push({attr: req.attr, points: codeReq - codeVal, target: req.value});
            codeDeficitAttrs.add(req.attr);
          } else if (codeVal > codeReq) {
            const diff = codeVal - codeReq;
            const usable = mode === "dropshop" ? diff : Math.min(diff, 1);
            if (usable > 0) codeResources.push({attr: req.attr, points: usable, target: req.value});
          }
        } else if (req.type === 'max') {
          if (codeVal > codeReq) {
            codeDeficits.push({attr: req.attr, points: codeVal - codeReq, target: req.value});
            codeDeficitAttrs.add(req.attr);
          }
          const maxDrop = codeVal - CODE_VALUES["X"];
          const usable = mode === "dropshop" ? maxDrop : Math.min(maxDrop, 1);
          if (usable > 0) codeResources.push({attr: req.attr, points: usable, target: req.value});
        } else if (req.type === 'exact') {
          if (codeVal !== codeReq) {
            const diff = Math.abs(codeVal - codeReq);
            codeDeficits.push({attr: req.attr, points: diff, target: req.value});
            codeDeficitAttrs.add(req.attr);
            if (codeVal > codeReq) {
              codeResources.push({attr: req.attr, points: diff, target: req.value});
            }
          }
        }
      }
      
      // Phase 3: Remaining resources
      for (const attr of ATTRS) {
        if (!scoreDeficitAttrs.has(attr) && !lockedScoreAttrs.has(attr) && !basicScoreAttrs.has(attr)) {
          const val = scores[attr];
          if (val > 1) {
            const usable = Math.min(val, 2);
            scoreResources.push({attr, points: usable, target: 0});
          }
        }
        
        if (!codeDeficitAttrs.has(attr) && !lockedCodeAttrs.has(attr) && !basicCodeAttrs.has(attr)) {
          const codeVal = CODE_VALUES[codes[attr]];
          if (codeVal > CODE_VALUES["X"]) {
            const diff = codeVal - CODE_VALUES["X"];
            const usable = mode === "dropshop" ? diff : Math.min(diff, 1);
            codeResources.push({attr, points: usable, target: "X"});
          }
        }
      }
      
      // Calculate balance
      const scoreError = scoreDeficits.reduce((s,d) => s + (d.points || 0), 0);
      const codeError = mode === "dropshop" 
        ? codeDeficits.reduce((s,d) => s + (d.points || 0), 0)
        : codeDeficits.length * 2;
      const errorPoints = scoreError + codeError;
      
      const bonusAvailable = mode === "sizing"
        ? scoreResources.reduce((s,r) => s + (r.points || 0), 0) + 
          codeResources.reduce((s,r) => s + (r.points || 0) * 2, 0)
        : codeResources.reduce((s,r) => s + (r.points || 0), 0);
      
      return {
        role: roleName,
        scoreDeficits,
        scoreResources,
        codeDeficits,
        codeResources,
        errorPoints,
        bonusAvailable,
        malusNeeded: errorPoints
      };
    }

    function checkRole(scores, codes, roleDef) {
      const analysis = analyzeRoleFit(scores, codes, "", roleDef, "sizing");
      return analysis && analysis.errorPoints === 0;
    }

    function SagaChecker() {
      const [scores, setScores] = useState(
        Object.fromEntries(ATTRS.map(a => [a, 1]))
      );
      const [codes, setCodes] = useState(
        Object.fromEntries(ATTRS.map(a => [a, "X"]))
      );
      const [results, setResults] = useState([]);
      const [selectedRole, setSelectedRole] = useState(null);
      
      const updateScore = (attr, val) => {
        const num = parseInt(val) || 1;
        setScores(prev => ({...prev, [attr]: Math.max(1, Math.min(10, num))}));
      };
      
      const updateCode = (attr, val) => {
        setCodes(prev => ({...prev, [attr]: val}));
      };
      
      const runCheck = (checkMode) => {
        setSelectedRole(null);
        const matches = [];
        
        for (const [name, def] of Object.entries(ROLES)) {
          if (checkMode === 'perfect') {
            if (checkRole(scores, codes, def)) matches.push({name, analysis: null});
          } else {
            const analysis = analyzeRoleFit(scores, codes, name, def, 
              checkMode === 'dropshop' ? 'dropshop' : 'sizing');
            
            if (!analysis || analysis.bonusAvailable < analysis.malusNeeded) continue;
            
            if (checkMode === 'loose' && analysis.errorPoints >= 1 && analysis.errorPoints <= 2) {
              matches.push({name, analysis});
            } else if (checkMode === 'oversized' && analysis.errorPoints >= 3 && analysis.errorPoints <= 4) {
              matches.push({name, analysis});
            } else if (checkMode === 'dropshop' && analysis.errorPoints >= 5) {
              matches.push({name, analysis});
            }
          }
        }
        
        setResults(matches);
      };
      
      const renderDetail = () => {
        if (!selectedRole) return null;
        
        const { name, analysis } = selectedRole;
        
        if (!analysis) {
          return (
            <div className="border-t-2 border-gray-300 pt-4 bg-gray-50 p-4">
              <h3 className="font-bold text-lg mb-3">{name}</h3>
              <div className="grid grid-cols-8 gap-1 mb-2 text-xs font-mono">
                {ATTRS.map(attr => (
                  <div key={attr} className="text-center font-bold">{attr}</div>
                ))}
              </div>
              <div className="grid grid-cols-8 gap-1 mb-1 text-xs font-mono">
                {ATTRS.map(attr => (
                  <div key={attr} className="text-center text-green-600 font-semibold">
                    {scores[attr]}✓
                  </div>
                ))}
              </div>
              <div className="grid grid-cols-8 gap-1 text-xs font-mono">
                {ATTRS.map(attr => (
                  <div key={attr} className="text-center text-green-600 font-semibold">
                    {codes[attr]}✓
                  </div>
                ))}
              </div>
              <div className="mt-3 text-sm text-green-700 font-semibold">Perfect fit!</div>
            </div>
          );
        }
        
        const scoreStatus = {}, codeStatus = {};
        
        for (const d of analysis.scoreDeficits) {
          scoreStatus[d.attr] = {type: 'deficit', target: d.target};
        }
        for (const d of analysis.codeDeficits) {
          codeStatus[d.attr] = {type: 'deficit', target: d.target};
        }
        
        return (
          <div className="border-t-2 border-gray-300 pt-4 bg-gray-50 p-4">
            <h3 className="font-bold text-lg mb-3">{name}</h3>
            <div className="grid grid-cols-8 gap-1 mb-2 text-xs font-mono">
              {ATTRS.map(attr => (
                <div key={attr} className="text-center font-bold">{attr}</div>
              ))}
            </div>
            <div className="grid grid-cols-8 gap-1 mb-1 text-xs font-mono">
              {ATTRS.map(attr => {
                const status = scoreStatus[attr];
                if (status) {
                  return (
                    <div key={attr} className="text-center text-red-600 font-semibold">
                      {scores[attr]}→{status.target}
                    </div>
                  );
                }
                return (
                  <div key={attr} className="text-center text-green-600 font-semibold">
                    {scores[attr]}✓
                  </div>
                );
              })}
            </div>
            <div className="grid grid-cols-8 gap-1 text-xs font-mono">
              {ATTRS.map(attr => {
                const status = codeStatus[attr];
                if (status) {
                  return (
                    <div key={attr} className="text-center text-red-600 font-semibold">
                      {codes[attr]}→{status.target}
                    </div>
                  );
                }
                return (
                  <div key={attr} className="text-center text-green-600 font-semibold">
                    {codes[attr]}✓
                  </div>
                );
              })}
            </div>
            <div className="mt-3 text-sm">
              <span className="font-semibold">Resources:</span> {analysis.bonusAvailable} points
              <span className="text-gray-600 ml-3">Error: {analysis.errorPoints} points</span>
            </div>
          </div>
        );
      };
      
      return (
        <div className="max-w-4xl mx-auto p-4 font-sans">
          <h1 className="text-2xl font-bold mb-4 text-center">Dragonlance Saga Role Checker</h1>
          
          <div className="bg-white border-2 border-gray-300 p-4 mb-4">
            <div className="grid grid-cols-8 gap-2 mb-2">
              {ATTRS.map(attr => (
                <div key={attr} className="text-center font-bold text-sm">{attr}</div>
              ))}
            </div>
            <div className="grid grid-cols-8 gap-2 mb-2">
              {ATTRS.map(attr => (
                <input
                  key={attr}
                  type="number"
                  min="1"
                  max="10"
                  value={scores[attr]}
                  onChange={(e) => updateScore(attr, e.target.value)}
                  className="w-full text-center border border-gray-300 rounded p-1 text-sm"
                />
              ))}
            </div>
            <div className="grid grid-cols-8 gap-2">
              {ATTRS.map(attr => (
                <select
                  key={attr}
                  value={codes[attr]}
                  onChange={(e) => updateCode(attr, e.target.value)}
                  className="w-full text-center border border-gray-300 rounded p-1 text-sm"
                >
                  {CODES.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              ))}
            </div>
            
            <div className="flex flex-wrap gap-2 mt-4 justify-center">
              <button onClick={() => runCheck('perfect')} className="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
                Perfect
              </button>
              <button onClick={() => runCheck('loose')} className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                Loose
              </button>
              <button onClick={() => runCheck('oversized')} className="px-4 py-2 bg-yellow-600 text-white rounded hover:bg-yellow-700">
                Oversized
              </button>
              <button onClick={() => runCheck('dropshop')} className="px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700">
                Dropshop
              </button>
            </div>
          </div>
          
          {results.length > 0 && (
            <div className="bg-white border-2 border-gray-300 p-4 mb-4">
              <h2 className="font-bold mb-2">Results ({results.length})</h2>
              <div className="max-h-48 overflow-y-auto">
                {results.map(({name}) => (
                  <div
                    key={name}
                    onClick={() => setSelectedRole(results.find(r => r.name === name))}
                    className={`p-2 cursor-pointer hover:bg-gray-100 border-b ${
                      selectedRole?.name === name ? 'bg-blue-100' : ''
                    }`}
                  >
                    {name}
                  </div>
                ))}
              </div>
            </div>
          )}
          
          {renderDetail()}
        </div>
      );
    }

    ReactDOM.render(<SagaChecker />, document.getElementById('root'));
  </script>
</body>
</html>
